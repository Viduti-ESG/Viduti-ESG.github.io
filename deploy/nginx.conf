server {
    listen 80;
    server_name greencurve.solutions www.greencurve.solutions _;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    root /var/www/greencurve;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compression ──────────────────────────────────────────────────────────
    # Compresses both static assets and proxied /api/ JSON responses.
    # gzip is built into stock nginx; brotli needs the ngx_brotli module (see below).
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_proxied      any;          # compress responses proxied from uvicorn too
    gzip_types
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Optional Brotli (better ratio than gzip). Requires the ngx_brotli module:
    #   sudo apt install libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static
    # then uncomment:
    # brotli            on;
    # brotli_comp_level 5;
    # brotli_types      application/json application/javascript image/svg+xml text/css text/plain;

    # Drop common attack/scanner paths (wp, asp/jsp, cgi, graphql, env, git, phpmyadmin, ...) with 444
    location ~* (?:/wp-admin|/wp-login|/wp-includes|/wp-content|/wordpress|xmlrpc.php|/cgi-bin/|.(?:asp|aspx|jsp|cfm|env)$|/graphql|/server-status|/.git|/vendor/|/phpmyadmin|/pma/|/install.php|/owa/|/autodiscover|/boaform) {
        return 444;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── AI backend (brsr-generator) — 2nd uvicorn on :8001 ──────────────────────
    # Replaces the ephemeral lhr.life tunnel. These endpoints live ONLY on the
    # brsr-generator service; everything else under /api/ stays on the main
    # backend (:8000). Because the frontend now uses same-origin URLs (see
    # assets/js/gc-config.js), nginx fans each /api/ request out to the right
    # backend purely by path — no CORS, no tunnel, no overloaded localStorage key.
    # Regex locations are evaluated before the /api/ prefix block below, so these win.
    # Long read timeout + larger body: Claude report/PDF/XBRL generation is slow & big.
    location ~ ^/api/(esg-search|esg-company-profile|board-briefing|generate-report|export-pdf|export-xbrl|find-similar|form-schema|ghg-chat|verify-ghg|extract-bill|value-chain) {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25M;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location / {
        if ($gc_bad_bot) { return 444; }
        # Clean URLs: 301 /page.html -> /page. Match on $request_uri (NOT $uri) so
        # the index directive's internal "/" -> /index.html jump is not caught.
        # The old `rewrite ^/(.*.html)$ /$1` kept .html inside $1, so every .html
        # page redirected to itself -> ERR_TOO_MANY_REDIRECTS.
        if ($request_uri ~ ^/(.*)\.html($|\?)) {
            return 301 /$1$is_args$args;
        }
        try_files $uri $uri.html $uri/ =404;
    }
}
