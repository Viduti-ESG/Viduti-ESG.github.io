server {
    listen 80;
    server_name greencurve.solutions www.greencurve.solutions;

    # Restore real visitor IPs from Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    real_ip_header CF-Connecting-IP;

    # Block direct IP access (must come via Cloudflare). www must stay allowed —
    # a bare inequality against the apex 444s www.greencurve.solutions (CF 520).
    if ($host !~ ^(www\.)?greencurve\.solutions$) {
        return 444;
    }

    root /var/www/greencurve;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compression ──────────────────────────────────────────────────────────
    # Compresses both static assets and proxied /api/ JSON responses.
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_proxied      any;          # compress responses proxied from uvicorn too
    gzip_types
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Drop common attack/scanner paths (wp, asp/jsp, cgi, graphql, env, git, phpmyadmin, ...) with 444
    location ~* (?:/wp-admin|/wp-login|/wp-includes|/wp-content|/wordpress|xmlrpc.php|/cgi-bin/|.(?:asp|aspx|jsp|cfm|env)$|/graphql|/server-status|/.git|/vendor/|/phpmyadmin|/pma/|/install.php|/owa/|/autodiscover|/boaform) {
        return 444;
    }

    # Static assets — long cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Digital Asset Links — must be reachable over HTTPS as application/json.
    # This is what verifies the Green Curve Bookings Android app (TWA) owns the
    # domain; without it the app shows a browser URL bar instead of full-screen.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options "nosniff" always;
        try_files /.well-known/assetlinks.json =404;
    }

    # Booking app service worker — served from root so its scope is "/".
    location = /booking-sw.js {
        default_type application/javascript;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        try_files /booking-sw.js =404;
    }

    # Web app manifest for the booking PWA/TWA.
    location = /booking.webmanifest {
        default_type application/manifest+json;
        add_header X-Content-Type-Options "nosniff" always;
        try_files /booking.webmanifest =404;
    }

    # ── AI backend (brsr-generator) — 2nd uvicorn on :8001 ──────────────────────
    # These endpoints live ONLY on the brsr-generator service (gcai); everything
    # else under /api/ stays on the main backend (:8000). The frontend uses
    # same-origin URLs (assets/js/gc-config.js), so nginx fans each /api/ request
    # out to the right backend purely by path — no CORS, no tunnel.
    # Regex locations are evaluated before the /api/ prefix block below, so these win.
    # Long read timeout + larger body: Claude report/PDF/XBRL generation is slow & big.
    location ~ ^/api/(esg-search|esg-company-profile|board-briefing|generate-report|export-pdf|export-xbrl|find-similar|form-schema|ghg-chat|verify-ghg|extract-bill|value-chain) {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25M;
    }

    # API — proxy to uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # Public booking rooms — clean link /book/{slug} always serves the booking
    # shell; the slug is read client-side. Keep above the generic location.
    # IMPORTANT: this page must be embeddable on third-party sites (the embed
    # widget/iframe feature). Declaring add_header here cancels inheritance of
    # the server-level X-Frame-Options, and frame-ancestors * explicitly allows
    # embedding. Do NOT add X-Frame-Options in this block.
    location /book/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        try_files /book.html =404;
    }

    # HTML pages — clean URLs + bot block
    location / {
        if ($gc_bad_bot) { return 444; }
        # Clean URLs: 301 /page.html -> /page. Match on $request_uri (NOT $uri) so
        # the index directive's internal "/" -> /index.html jump is not caught.
        # The old `rewrite ^/(.*.html)$ /$1` kept .html inside $1, so every .html
        # page redirected to itself -> ERR_TOO_MANY_REDIRECTS.
        if ($request_uri ~ ^/(.*)\.html($|\?)) {
            return 301 /$1$is_args$args;
        }
        try_files $uri $uri.html $uri/ =404;
    }
}
