<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — Green Curve Bookings</title>
  <meta name="theme-color" content="#050e07" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#050e07;color:#dde4f0;min-height:100vh;min-height:100dvh;
      display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
    .card{max-width:360px}
    img{width:72px;height:72px;border-radius:20px;margin:0 auto 24px;box-shadow:0 24px 80px rgba(0,0,0,.6)}
    h1{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:10px}
    p{color:rgba(221,228,240,.6);font-size:.95rem;margin-bottom:26px;line-height:1.6}
    button{background:#22c55e;color:#04110a;border:none;border-radius:14px;padding:13px 30px;font:600 .95rem 'DM Sans',sans-serif;
      cursor:pointer;box-shadow:0 0 24px rgba(34,197,94,.25)}
    button:active{transform:scale(.98)}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#fb7185;margin-right:8px;vertical-align:middle}
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/img/app-icon-512.png" alt="Green Curve Bookings" />
    <h1>You're offline</h1>
    <p><span class="dot"></span>Booking data needs a live connection so you always see accurate times. Reconnect and try again.</p>
    <button onclick="location.replace('/app')">Retry</button>
  </div>
  <script>
    window.addEventListener("online", function(){ location.replace("/app"); });
  </script>
</body>
</html>
